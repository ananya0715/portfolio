<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ananya's Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #333;
    }

    header {
      background: #2575fc;
      color: white;
      text-align: center;
      padding: 50px 20px;
    }

    header h1 {
      margin-bottom: 10px;
      font-size: 2.5rem;
    }

    header p {
      font-size: 1.2rem;
    }

    section {
      padding: 50px 20px;
      text-align: center;
    }

    h2 {
      color: #2575fc;
      margin-bottom: 20px;
    }

    .skills {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .skill {
      background: #fff;
      padding: 15px 25px;
      border-radius: 10px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
      font-weight: bold;
      transition: 0.3s;
    }

    .skill:hover {
      transform: translateY(-5px);
      background: #e0e7ff;
    }

    .contact-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #2575fc;
      color: white;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .contact-btn:hover {
      background: #1a5bcc;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #333;
      color: white;
    }
  </style>
</head>
<body>

  <header>
    <h1>Ananya Dhungana</h1>
    <p>Aspiring Software Engineer | Web Developer</p>
  </header>

  <section>
    <h2>Skills</h2>
    <div class="skills">
      <div class="skill">HTML</div>
      <div class="skill">CSS</div>
      <div class="skill">JavaScript</div>
      <div class="skill">basics of PHP & Java</div>
      <div class="skill">Database Management System</div>
     
     
    </div>
  </section>

  <footer>
    &copy; 2026 Ananya Dhungana | Made with ❤️
  </footer>

  <script>
    // Simple JavaScript example: alert on page load
    window.onload = function() {
      console.log("Welcome to Ananya's Portfolio!");
    };
  </script>

</body>
</html>
